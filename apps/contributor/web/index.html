<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forest Data Harmonizer — Contributor</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
  <header>
    <div class="header-brand">
      <img src="dh-logo.png" alt="Forest Data Harmonizer" class="header-logo" />
      <span id="header-subtitle">Contributor draft tool</span>
    </div>
    <div id="lang-switcher" class="lang-switcher"></div>
  </header>

  <div id="step-indicator"></div>

  <div id="error-bar"></div>

  <div id="main" style="padding: 2rem; color: #666;">Loading application…</div>

  <div id="nav"></div>

  <!-- Leaflet coordinate picker modal -->
  <div id="map-modal">
    <div id="map-modal-inner">
      <div id="map-modal-header">
        <span data-i18n="map.title">Click the map to set plot centroid coordinates</span>
        <button id="map-modal-close" class="btn btn-ghost" data-i18n="common.cancel">Cancel</button>
      </div>
      <div id="map-container"></div>
      <div id="map-modal-footer">
        <span id="map-coords-display" data-i18n="map.noPoint">No point selected</span>
        <button id="map-modal-confirm" class="btn btn-primary" disabled data-i18n="map.useCoords">Use these coordinates</button>
      </div>
    </div>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <span id="loading-msg" data-i18n="common.working">Working…</span>
  </div>

  <!-- Tauri API injection (required for Tauri v2) -->
  <script>
    // Check if Tauri is being injected by Tauri itself
    if (!window.__TAURI__) {
      console.log('Tauri not injected, will initialize manually');
    } else {
      console.log('Tauri API available');
    }
  </script>
  <script src="i18n.js"></script>
  <script src="locales/en.js"></script>
  <script src="locales/es.js"></script>
  <script src="locales/pt.js"></script>
  <script src="locales/bundle.js"></script>
  <script src="app.js"></script>
</body>
</html>
